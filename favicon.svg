<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      .logo-bg {
        fill: #0066cc;
      }
      .logo-text {
        fill: white;
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
        font-size: 8px;
      }
    </style>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" class="logo-bg"/>
  
  <!-- Wanderlust Albania logo representation -->
  <text x="16" y="12" text-anchor="middle" class="logo-text">W</text>
  <text x="16" y="22" text-anchor="middle" class="logo-text" font-size="6px">A</text>
</svg>
